version: 4.1.32
steps:
  - prompt: Open the browser and navigate to the website.
    commands:
      - command: hover-text
        text: tunisianet.com.tn
        description: current URL in the address bar
        action: click
      - command: type
        text: example.com
  - prompt: Open the browser and navigate to the website.
    commands:
      - command: press-keys
        keys:
          - enter
  - prompt: Assert that the page loads without errors.
    commands:
      - command: assert
        expect: the page displays "Example Domain"
  - prompt: >-
      Assert that the website logo is visible.  # Use the content of the file
      from the environment
    commands:
      - command: assert
        expect: the "Example Domain" text is visible
